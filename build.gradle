plugins {
    id("groovy")
    id("com.github.johnrengelman.shadow") version "7.0.0"
    id("io.micronaut.application") version "1.5.0"
}

version = "0.1"
group = "com.myexample"

repositories {
    mavenCentral()
}

micronaut {
    runtime("netty")
    testRuntime("spock2")
    processing {
        incremental(true)
        annotations("com.myexample.*")
    }
}

dependencies {
    implementation("io.micronaut:micronaut-validation")
    implementation("io.micronaut.groovy:micronaut-runtime-groovy")
    implementation("javax.annotation:javax.annotation-api")
    implementation("io.micronaut:micronaut-http-client")
    runtimeOnly("ch.qos.logback:logback-classic")

    // **********************   DB Dependencies
    // MySQL
    runtimeOnly("mysql:mysql-connector-java")
    // GORM & Hibernate
    implementation("io.micronaut.groovy:micronaut-hibernate-gorm")
    implementation("io.micronaut.beanvalidation:micronaut-hibernate-validator")
    // Connection Pool
    runtimeOnly("org.apache.tomcat:tomcat-jdbc")
    implementation("io.micronaut.sql:micronaut-jdbc-tomcat")

    // Flyway
    implementation("io.micronaut.flyway:micronaut-flyway")

    // ********************** Spring Security Crypto
    implementation "org.springframework.security:spring-security-crypto:${springSecurityCryptoVersion}"

    // ********************** Micronaut Security
    implementation("io.micronaut.security:micronaut-security")
    implementation("io.micronaut.security:micronaut-security-jwt")
    implementation("io.micronaut.security:micronaut-security-oauth2")

    // ********************** OpenAPI
    implementation("io.micronaut.openapi:micronaut-openapi:2.3.1")
    implementation("io.swagger.core.v3:swagger-annotations")

    // ********************** Management
    implementation("io.micronaut:micronaut-management")
    implementation("io.micronaut.micrometer:micronaut-micrometer-registry-prometheus")
}


application {
    mainClass.set("com.myexample.Application")
}

java {
    sourceCompatibility = JavaVersion.toVersion("11")
    targetCompatibility = JavaVersion.toVersion("11")
}

tasks.withType(GroovyCompile) {
    groovyOptions.forkOptions.jvmArgs.add('-Dgroovy.parameters=true')
    groovyOptions.forkOptions.jvmArgs.add('-Dmicronaut.openapi.views.spec=rapidoc.enabled=true,swagger-ui.enabled=true,swagger-ui.theme=flattop')
    groovyOptions.forkOptions.jvmArgs.add('-Dmicronaut.openapi.additional.files=src/main/resources/swagger')
}


